services:
  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

  terminal:
    build: .
    volumes:
      - ~/.ssh/id_ed25519.pub:/import/id_ed25519.pub:ro
      - ./ttyd/ssh-key/id_ed25519.pub:/import/ttyd.pub:ro
      - terminal_data:/data
    restart: unless-stopped

  todo:
    build: ../my-todo
    environment:
      DATABASE_URL: postgres://todo:todo@todo-db:5432/todo
    depends_on:
      todo-db:
        condition: service_healthy
    restart: unless-stopped

  todo-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    volumes:
      - todo_pgdata:/var/lib/postgresql/data
      - ../my-todo/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo"]
      interval: 5s
      timeout: 5s
      retries: 5

  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    env_file: ./homarr/.env
    volumes:
      - ./homarr/appdata:/appdata
    environment:
      - DISABLE_ANALYTICS=true
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    env_file: ./cloudflared/.env
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared
    depends_on:
      - terminal
    restart: unless-stopped

volumes:
  terminal_data:
  todo_pgdata:
