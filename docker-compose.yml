services:
  postgres:
    image: postgres:16-alpine
    env_file: ./postgres/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - edge
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    env_file: ./keycloak/.env
    command: start-dev
    networks:
      - edge
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  terminal:
    build: .
    volumes:
      - ~/.ssh/id_ed25519.pub:/import/id_ed25519.pub:ro
      - terminal_data:/data
    networks:
      - edge
    restart: unless-stopped

  registry:
    build: ./registry
    env_file: ./registry/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - ./traefik/dynamic:/traefik-routes:rw
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TRAEFIK_ROUTES_DIR: /traefik-routes
    networks:
      - edge
      - internal
    restart: unless-stopped

  backup:
    build: ./backup
    env_file: ./backup/.env
    networks:
      - edge
      - internal
    depends_on:
      - postgres
      - registry
    volumes:
      - backup_data:${BACKUP_DIR:-/backups}
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    env_file: ./cloudflared/.env
    command: tunnel --protocol http2 --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared
    depends_on:
      - traefik
    networks:
      - edge
    restart: unless-stopped

  traefik:
    image: traefik:v3.1
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
    volumes:
      - ./traefik:/etc/traefik:ro
    networks:
      - edge
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    env_file: ./oauth2-proxy/.env
    command:
      - "--provider=keycloak-oidc"
      - "--oidc-issuer-url=http://keycloak:8080/realms/local"
      - "--login-url=https://auth.joedodge.dev/realms/local/protocol/openid-connect/auth"
      - "--redeem-url=http://keycloak:8080/realms/local/protocol/openid-connect/token"
      - "--oidc-jwks-url=http://keycloak:8080/realms/local/protocol/openid-connect/certs"
      - "--insecure-oidc-skip-issuer-verification"
      - "--skip-oidc-discovery"
      - "--email-domain=*"
      - "--http-address=0.0.0.0:4180"
      - "--cookie-domain=.joedodge.dev"
    depends_on:
      - keycloak
    networks:
      - edge
    restart: unless-stopped

volumes:
  terminal_data:
  postgres_data:
  backup_data:

networks:
  edge:
  internal:
