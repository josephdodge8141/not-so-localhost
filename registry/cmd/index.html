<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Registry</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#f1f5f9;--muted:#94a3b8;--primary:#3b82f6;--primary-hover:#2563eb;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.3)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:1.25rem;font-weight:600}
.header h1 span{color:var(--primary)}
.btn{padding:8px 16px;border-radius:var(--radius);border:none;cursor:pointer;font-size:.875rem;font-weight:500;transition:background .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-sm{padding:4px 10px;font-size:.75rem}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--surface2)}
.tabs{display:flex;gap:4px;padding:16px 24px 0;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:var(--radius) var(--radius) 0 0;border:none;cursor:pointer;font-size:.875rem;background:transparent;color:var(--muted);transition:all .15s}
.tab:hover{color:var(--text);background:var(--surface)}
.tab.active{background:var(--surface);color:var(--text);font-weight:600}
.content{padding:16px 24px 24px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color .15s}
.card:hover{border-color:var(--primary)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px}
.card-name{font-weight:600;font-size:1rem}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.6875rem;font-weight:600;text-transform:uppercase;white-space:nowrap}
.badge-fe{background:#1e3a5f;color:#60a5fa}
.badge-be{background:#1e3a3f;color:#34d399}
.badge-db{background:#3b1f3b;color:#c084fc}
.card-body{font-size:.8125rem;color:var(--muted)}
.card-body p{margin-bottom:6px}
.card-body .label{color:var(--text);font-weight:500}
.card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:480px}
.modal h2{margin-bottom:16px;font-size:1.125rem}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.8125rem;color:var(--muted);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:.875rem}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.form-group.hidden{display:none}
.empty{text-align:center;padding:48px;color:var(--muted)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;font-size:.875rem;z-index:200;box-shadow:var(--shadow);animation:fadeIn .2s}
.toast.error{border-color:var(--red)}
.toast.success{border-color:var(--green)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}
@media(max-width:640px){.card-grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:stretch}.header .btn{align-self:flex-end}}
</style>
</head>
<body>
<div class="header">
  <h1><span>Apps</span>.joedodge.dev</h1>
  <button class="btn btn-primary" onclick="showForm()">+ Register App</button>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-type="" onclick="filterApps('')">All</button>
  <button class="tab" data-type="fe" onclick="filterApps('fe')">Frontend</button>
  <button class="tab" data-type="be" onclick="filterApps('be')">Backend</button>
  <button class="tab" data-type="db" onclick="filterApps('db')">Database</button>
</div>

<div class="content">
  <div class="card-grid" id="appGrid"></div>
</div>

<div class="modal-overlay hidden" id="formModal">
  <div class="modal">
    <h2 id="formTitle">Register App</h2>
    <form id="appForm" onsubmit="submitForm(event)">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" required>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <input type="text" id="description" placeholder="Optional">
      </div>
      <div class="form-group">
        <label for="app_type">Type</label>
        <select id="app_type" required onchange="onTypeChange()">
          <option value="fe">Frontend</option>
          <option value="be">Backend (OpenAPI)</option>
          <option value="db">Database (Postgres)</option>
        </select>
      </div>
      <div class="form-group" id="field-route">
        <label for="route_rule">Route Rule <span class="muted">(leave blank for default)</span></label>
        <input type="text" id="route_rule" placeholder='e.g. Host(`apps.jd.dev`) && PathPrefix(`/myapp`)'>
      </div>
      <div class="form-group" id="field-target_url">
        <label for="target_url">Target URL</label>
        <input type="text" id="target_url" placeholder="http://myapp:3000">
      </div>
      <div class="form-group hidden" id="field-docs_url">
        <label for="docs_url">OpenAPI Spec URL</label>
        <input type="text" id="docs_url" placeholder="http://myapp:3000/swagger">
      </div>
      <div class="form-group hidden" id="field-connection_string">
        <label for="connection_string">Connection String</label>
        <input type="text" id="connection_string" placeholder="postgres://user:pass@host:5432/db">
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="no_auth" style="width:auto">
          Bypass authentication
        </label>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="hideForm()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
let apps = [];
let currentFilter = '';

async function fetchApps() {
  const url = currentFilter ? `/api/apps?type=${currentFilter}` : '/api/apps';
  const res = await fetch(url);
  apps = await res.json();
  renderApps();
}

function filterApps(type) {
  currentFilter = type;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.type === type);
  });
  fetchApps();
}

function onTypeChange() {
  const t = document.getElementById('app_type').value;
  document.getElementById('field-target_url').classList.toggle('hidden', t !== 'fe');
  document.getElementById('field-docs_url').classList.toggle('hidden', t !== 'be');
  document.getElementById('field-connection_string').classList.toggle('hidden', t !== 'db');
}

function renderApps() {
  const grid = document.getElementById('appGrid');
  if (apps.length === 0) {
    grid.innerHTML = '<div class="empty">No apps registered. Click "+ Register App" to add one.</div>';
    return;
  }
  grid.innerHTML = apps.map(app => {
    const badgeClass = `badge-${app.app_type}`;
    const badgeLabel = app.app_type === 'fe' ? 'Web' : app.app_type === 'be' ? 'API' : 'DB';
    const openUrl = (() => {
      const hostMatch = app.route_rule && app.route_rule.match(/Host\(`([^`]+)`\)/);
      if (hostMatch) {
        const pathMatch = app.route_rule.match(/PathPrefix\(`([^`]+)`\)/);
        return `https://${hostMatch[1]}${pathMatch ? pathMatch[1] : ''}`;
      }
      return '#';
    })();
    const desc = app.description ? `<p>${escapeHtml(app.description)}</p>` : '';
    return `<div class="card">
      <div class="card-header">
        <div>
          <div class="card-name">${escapeHtml(app.name)}</div>
          <span class="badge ${badgeClass}">${badgeLabel}</span>
        </div>
      </div>
      <div class="card-body">
        ${desc}
        <p><span class="label">Route:</span> <code>${escapeHtml(app.route_rule)}</code></p>
      </div>
      <div class="card-actions">
        <a href="${openUrl}" target="_blank" class="btn btn-sm btn-primary">Open →</a>
        <button class="btn btn-sm btn-outline" onclick="editApp('${app.id}')">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteApp('${app.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML.replace(/"/g, '&quot;');
}

function showForm(app) {
  document.getElementById('formModal').classList.remove('hidden');
  onTypeChange();
  if (app) {
    document.getElementById('formTitle').textContent = 'Edit App';
    document.getElementById('editId').value = app.id;
    document.getElementById('name').value = app.name;
    document.getElementById('description').value = app.description;
    document.getElementById('app_type').value = app.app_type;
    document.getElementById('route_rule').value = app.route_rule;
    document.getElementById('target_url').value = app.target_url || '';
    document.getElementById('docs_url').value = app.docs_url || '';
    document.getElementById('connection_string').value = '';
    document.getElementById('no_auth').checked = app.no_auth;
  } else {
    document.getElementById('formTitle').textContent = 'Register App';
    document.getElementById('editId').value = '';
    document.getElementById('appForm').reset();
    document.getElementById('no_auth').checked = false;
  }
  onTypeChange();
}

function hideForm() {
  document.getElementById('formModal').classList.add('hidden');
}

function editApp(id) {
  const app = apps.find(a => a.id === id);
  if (app) showForm(app);
}

async function deleteApp(id) {
  if (!confirm('Delete this app registration?')) return;
  const res = await fetch(`/api/apps/${id}`, { method: 'DELETE' });
  if (res.ok) {
    showToast('App deleted', 'success');
    fetchApps();
  } else {
    showToast('Failed to delete', 'error');
  }
}

async function submitForm(e) {
  e.preventDefault();
  const id = document.getElementById('editId').value;
  const appType = document.getElementById('app_type').value;
  const body = {
    name: document.getElementById('name').value,
    description: document.getElementById('description').value,
    app_type: appType,
    route_rule: document.getElementById('route_rule').value,
    no_auth: document.getElementById('no_auth').checked,
  };
  if (appType === 'fe') body.target_url = document.getElementById('target_url').value;
  if (appType === 'be') body.docs_url = document.getElementById('docs_url').value;
  if (appType === 'db') body.connection_string = document.getElementById('connection_string').value;

  const method = id ? 'PUT' : 'POST';
  const url = id ? `/api/apps/${id}` : '/api/apps';
  const res = await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (res.ok) {
    showToast(id ? 'App updated' : 'App registered', 'success');
    hideForm();
    fetchApps();
  } else {
    const text = await res.text();
    showToast('Error: ' + text, 'error');
  }
}

function showToast(msg, type) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

fetchApps();
</script>
</body>
</html>
